name: Feature Request
description: 提议与项目目标一致的新能力或改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请确认你的提议与仓库目标一致：天气市场、单机部署、RocksDB 唯一存储、严格风控、事件驱动。
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 先说明缺口，而不是直接给方案
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述你希望如何实现
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 对现有约束的影响
      description: 说明是否影响单主写、RocksDB、风控、回放或资源预算
      placeholder: 不影响单主写；仅新增一个轻量级内部模块
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 描述你考虑过但放弃的方案
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已阅读 README 和 AGENTS.md
          required: true
        - label: 该提议不会把项目扩展成多数据库或多服务平台
          required: true
        - label: 该提议不会让 LLM 成为直接交易决策者
          required: true
