<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1120" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <style>
      .title { font: 700 28px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .dim { font: 500 16px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94A3B8; }
      .mono { font: 600 20px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #E2E8F0; }
      .prompt { font: 700 20px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #4ADE80; }
      .note { font: 600 14px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #BFDBFE; }
    </style>
  </defs>

  <rect width="1200" height="560" rx="26" fill="#08111F"/>
  <rect x="54" y="48" width="1092" height="464" rx="24" fill="url(#bg)" stroke="#334155"/>
  <rect x="54" y="48" width="1092" height="54" rx="24" fill="#0B1220"/>
  <circle cx="98" cy="75" r="8" fill="#EF4444"/>
  <circle cx="126" cy="75" r="8" fill="#F59E0B"/>
  <circle cx="154" cy="75" r="8" fill="#22C55E"/>
  <text x="194" y="82" class="dim">Quick Start / tradingd</text>

  <text x="104" y="150" class="title">Run the daemon in one command</text>
  <text x="104" y="184" class="dim">Minimal, direct, and consistent with the repository's single-process design.</text>

  <rect x="92" y="220" width="1016" height="228" rx="20" fill="#020617" stroke="#1E293B"/>
  <path d="M92 284H1108" stroke="#1E293B"/>

  <text x="124" y="266" class="note">release build</text>
  <text x="124" y="330" class="prompt">$</text>
  <text x="152" y="330" class="mono">cargo run --release --bin tradingd -- daemon</text>

  <text x="124" y="382" class="prompt">$</text>
  <text x="152" y="382" class="mono">cargo run --release --bin tradingd -- run-once</text>

  <text x="124" y="434" class="prompt">$</text>
  <text x="152" y="434" class="mono">cargo run --release --bin tradingd -- discover-markets</text>

  <rect x="838" y="140" width="242" height="48" rx="16" fill="url(#glow)" fill-opacity="0.16" stroke="#38BDF8"/>
  <text x="866" y="170" class="note">maker-first / risk-gated / replayable</text>
</svg>
